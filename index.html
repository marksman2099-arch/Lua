<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="container">
        <div class="envelope-wrapper" id="envelope-wrap" onclick="openLetter()">
            <div class="envelope">
                <div class="letter">
                    <div class="text">
                        <p><strong>إلى بنتي الحبيبة,</strong></p>
                        <p>دنيتي و روحي و ملاكي الشطور السباعي الجميل</p>
                        <button onclick="startQuiz(event)">دوسي هنا</button>
                    </div>
                </div>
                <div class="front-pocket"></div>
            </div>
        </div>

        <div id="quiz-section">
            <h2 id="question-text">تعرفين شكد احبج ؟</h2>
            <p id="hint-text"></p>
            <div class="btn-container">
                <button id="yes-btn" onmouseover="moveYes(event)" ontouchstart="moveYes(event)">اي</button>
                <button id="no-btn" onclick="handleNo()">لا</button>
            </div>
        </div>

        <div id="galaxy-section">
            <video autoplay muted loop playsinline id="bg-video">
                <source src="galaxy%20(2).mp4" type="video/mp4">
            </video>
            <div class="galaxy-text">
                <p>صحححححح... انتي متعرفين شكد احبجججج</p>
                <h1>أني هلكد احبجججججججججججج</h1>
            </div>
        </div>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
